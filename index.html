const state={user:{name:"",studentId:""},index:0,answers:[],scores:Object.fromEntries(Object.keys(TYPES).map(k=>[k,0])),resultKey:null};
const $=s=>document.querySelector(s);const screens=document.querySelectorAll('.screen');let coverDone=false;
function skipCover(){if(coverDone)return;coverDone=true;$('#cover').classList.add('hidden')}window.addEventListener('pointerdown',skipCover);setTimeout(skipCover,2800);
function flash(id,msg){const el=$(id);el.textContent=msg;el.classList.remove('flash');void el.offsetWidth;el.classList.add('flash')}
function show(n){screens.forEach(s=>s.classList.toggle('active',s.dataset.screen===n));window.scrollTo({top:0,behavior:'smooth'})}
function chapter(title,sub,cb){$('#chapterTitle').textContent=title;$('#chapterSub').textContent=sub;const c=$('#chapter');c.classList.remove('show');void c.offsetWidth;c.classList.add('show');setTimeout(()=>{c.classList.remove('show');cb&&cb()},900)}
function resetQuiz(keepUser=true){state.index=0;state.answers=[];state.scores=Object.fromEntries(Object.keys(TYPES).map(k=>[k,0]));state.resultKey=null;if(!keepUser){state.user={name:'',studentId:''};$('#name').value='';$('#studentId').value=''}}
function begin(allowBlank){skipCover();const name=$('#name').value.trim();const studentId=$('#studentId').value.trim();if(!allowBlank&&(!name||!studentId)){flash('#startToast','请先填写姓名和学号，方便后续统计。');return}state.user={name:name||'体验同学',studentId:studentId||'未填写'};resetQuiz(true);chapter('第一卷','初识',()=>{renderQuestion();show('quiz')})}
function renderQuestion(){const q=QUESTIONS[state.index];$('#prevBtn').disabled=state.index===0;$('#count').textContent=`${String(state.index+1).padStart(2,'0')} / ${String(QUESTIONS.length).padStart(2,'0')}`;$('#bar').style.width=`${(state.index/QUESTIONS.length)*100}%`;$('#question').textContent=q.text;document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('on',i===state.index%6));$('#options').innerHTML='';q.options.forEach(([label,type],i)=>{const b=document.createElement('button');b.className='slip';b.type='button';b.textContent=label;b.addEventListener('click',()=>{b.classList.add('pick');setTimeout(()=>choose(type,i,label),220)});$('#options').appendChild(b)})}
function choose(type,optionIndex,label){const old=state.answers[state.index];if(old)state.scores[old.type]-=1;state.scores[type]+=1;state.answers[state.index]={question:state.index+1,option:optionIndex+1,label,type};state.index+=1;if(state.index===10){chapter('第二卷','见己',renderQuestion);return}if(state.index===20){chapter('第三卷','知行',renderQuestion);return}if(state.index>=QUESTIONS.length){$('#bar').style.width='100%';chapter('终卷','定象',renderResult)}else renderQuestion()}
function prevQuestion(){if(state.index<=0)return;state.index-=1;renderQuestion()}
function topType(){const priority=['li','yue','she','yu','shu','shu2'];return priority.slice().sort((a,b)=>state.scores[b]-state.scores[a]||priority.indexOf(a)-priority.indexOf(b))[0]}
function scoreText(){return `礼${state.scores.li} 乐${state.scores.yue} 射${state.scores.she} 御${state.scores.yu} 书${state.scores.shu} 数${state.scores.shu2}`}
function renderScores(){const max=Math.max(...Object.values(state.scores),1);const names={li:'礼',yue:'乐',she:'射',yu:'御',shu:'书',shu2:'数'};$('#scores').innerHTML=Object.keys(names).map(k=>`<div class="score-row"><span>${names[k]}</span><div class="score-line"><span style="--score:${state.scores[k]/max*100}%"></span></div><b>${state.scores[k]}</b></div>`).join('')}
function renderResult(){const key=topType();state.resultKey=key;const t=TYPES[key];$('#seal').textContent=t.seal;$('#resultTitle').textContent=t.title;$('#resultSub').textContent=t.sub;$('#resultDesc').textContent=t.desc;$('#resultRecommend').textContent=t.recommend;$('#chips').innerHTML=t.tags.map(tag=>`<span class="chip">${tag}</span>`).join('');renderScores();saveRecord(key,t.title);show('result')}
function currentRecord(){const title=$('#resultTitle').textContent||TYPES[state.resultKey]?.title||'未生成';return{time:new Date().toLocaleString('zh-CN',{hour12:false}),name:state.user.name,studentId:state.user.studentId,result:title,typeKey:state.resultKey||'',scores:scoreText(),answers:state.answers.map(a=>`${a.question}-${a.option}-${a.type}`).join('|')}}
function saveRecord(typeKey,title){const record=currentRecord();record.result=title;record.typeKey=typeKey;const records=JSON.parse(localStorage.getItem('liuyiRecordsV5')||'[]');records.push(record);localStorage.setItem('liuyiRecordsV5',JSON.stringify(records))}
function resultText(){const r=currentRecord();return `姓名：${r.name}\n学号：${r.studentId}\n六艺人格：${r.result}\n六维分数：${r.scores}\n答题摘要：${r.answers}\n明启新程，自有山海。`}
async function copyResult(){const text=resultText();try{await navigator.clipboard.writeText(text);flash('#resultToast','复制成功，可以粘贴到问卷星。')}catch{flash('#resultToast',text)}}
async function submitToWjx(){await copyResult();const url=WJX_CONFIG.formUrl.trim();if(url)window.open(url,'_blank','noopener')}
$('#startBtn').addEventListener('click',()=>begin(false));$('#skipBtn').addEventListener('click',()=>begin(true));$('#prevBtn').addEventListener('click',prevQuestion);$('#wjxBtn').addEventListener('click',submitToWjx);$('#copyBtn').addEventListener('click',copyResult);$('#againBtn').addEventListener('click',()=>{resetQuiz(false);show('start')});
</script>
