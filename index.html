function show(n){screens.forEach(s=>s.classList.toggle("active",s.dataset.screen===n));window.scrollTo({top:0,behavior:"smooth"})}
function resetQuiz(keepUser=true){state.index=0;state.answers=[];state.scores=Object.fromEntries(Object.keys(TYPES).map(k=>[k,0]));state.resultKey=null;if(!keepUser){state.user={name:"",studentId:""};$("#name").value="";$("#studentId").value=""}}
function begin(allowBlank){const name=$("#name").value.trim();const studentId=$("#studentId").value.trim();if(!allowBlank&&(!name||!studentId)){ $("#startToast").textContent="请先填写姓名和学号，方便后续统计。";return}state.user={name:name||"体验同学",studentId:studentId||"未填写"};$("#startToast").textContent="";resetQuiz(true);renderQuestion();show("quiz")}
function renderQuestion(){const q=QUESTIONS[state.index];$("#prevBtn").disabled=state.index===0;$("#count").textContent=`${String(state.index+1).padStart(2,"0")} / ${String(QUESTIONS.length).padStart(2,"0")}`;$("#bar").style.width=`${(state.index/QUESTIONS.length)*100}%`;$("#question").textContent=q.text;$("#options").innerHTML="";q.options.forEach(([label,type],i)=>{const b=document.createElement("button");b.className="option";b.type="button";b.textContent=label;b.addEventListener("click",()=>choose(type,i,label));$("#options").appendChild(b)})}
function choose(type,optionIndex,label){const old=state.answers[state.index];if(old){state.scores[old.type]-=1}state.scores[type]+=1;state.answers[state.index]={question:state.index+1,option:optionIndex+1,label,type};state.index+=1;if(state.index>=QUESTIONS.length){$("#bar").style.width="100%";setTimeout(renderResult,180)}else renderQuestion()}
function prevQuestion(){if(state.index<=0)return;state.index-=1;renderQuestion()}
function topType(){const priority=["li","yue","she","yu","shu","shu2"];return priority.slice().sort((a,b)=>state.scores[b]-state.scores[a]||priority.indexOf(a)-priority.indexOf(b))[0]}
function scoreText(){return `礼${state.scores.li} 乐${state.scores.yue} 射${state.scores.she} 御${state.scores.yu} 书${state.scores.shu} 数${state.scores.shu2}`}
function renderScores(){const max=Math.max(...Object.values(state.scores),1);const names={li:"礼",yue:"乐",she:"射",yu:"御",shu:"书",shu2:"数"};$("#scores").innerHTML=Object.keys(names).map(k=>`<div class="score-row"><span>${names[k]}</span><div class="score-line"><span style="width:${state.scores[k]/max*100}%"></span></div><b>${state.scores[k]}</b></div>`).join("")}
function renderResult(){const key=topType();state.resultKey=key;const t=TYPES[key];$("#seal").textContent=t.seal;$("#resultTitle").textContent=t.title;$("#resultSub").textContent=t.sub;$("#resultDesc").textContent=t.desc;$("#resultRecommend").textContent=t.recommend;$("#chips").innerHTML=t.tags.map(tag=>`<span class="chip">${tag}</span>`).join("");renderScores();saveRecord(key,t.title);show("result")}
function currentRecord(){const title=$("#resultTitle").textContent||TYPES[state.resultKey]?.title||"未生成";return{time:new Date().toLocaleString("zh-CN",{hour12:false}),name:state.user.name,studentId:state.user.studentId,result:title,typeKey:state.resultKey||"",scores:scoreText(),answers:state.answers.map(a=>`${a.question}-${a.option}-${a.type}`).join("|")}}
function saveRecord(typeKey,title){const record=currentRecord();record.result=title;record.typeKey=typeKey;const records=JSON.parse(localStorage.getItem("liuyiRecordsV2")||"[]");records.push(record);localStorage.setItem("liuyiRecordsV2",JSON.stringify(records))}
function resultText(){const r=currentRecord();return `姓名：${r.name}\n学号：${r.studentId}\n六艺人格：${r.result}\n六维分数：${r.scores}\n答题摘要：${r.answers}\n明启新程，自有山海。`}
async function copyResult(){const text=resultText();try{await navigator.clipboard.writeText(text);$("#resultToast").textContent="已复制结果文案，可以粘贴到问卷星或朋友圈。"}catch{$("#resultToast").textContent=text}}
async function submitToWjx(){await copyResult();if(!WJX_CONFIG.formUrl){$("#resultToast").textContent="已复制结果。请先在文件顶部 WJX_CONFIG.formUrl 填入问卷星发布链接，再用于正式提交。";return}const url=WJX_CONFIG.formUrl.trim();if(WJX_CONFIG.openInNewTab) window.open(url,"_blank","noopener"); else location.href=url}
function exportRecords(){const records=JSON.parse(localStorage.getItem("liuyiRecordsV2")||"[]");if(!records.length){$("#resultToast").textContent="本机还没有可导出的测试记录。";return}const header=["时间","姓名","学号","结果","类型","六维分数","答题摘要"];const rows=records.map(r=>[r.time,r.name,r.studentId,r.result,r.typeKey,r.scores,r.answers]);const csv=[header,...rows].map(row=>row.map(cell=>`"${String(cell).replaceAll('"','""')}"`).join(",")).join("\n");const blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"});const url=URL.createObjectURL(blob);const link=document.createElement("a");link.href=url;link.download="明德六艺人格测试V2记录.csv";link.click();URL.revokeObjectURL(url);$("#resultToast").textContent="已导出本机测试记录。正式使用以问卷星后台为准。"}
$("#startBtn").addEventListener("click",()=>begin(false));$("#prevBtn").addEventListener("click",prevQuestion);$("#skipBtn").addEventListener("click",()=>begin(true));$("#wjxBtn").addEventListener("click",submitToWjx);$("#copyBtn").addEventListener("click",copyResult);$("#againBtn").addEventListener("click",()=>{resetQuiz(false);show("start")});$("#exportBtn").addEventListener("click",exportRecords);
</script>
</body>
</html>
